# This NetworkPolicy allows ingress traffic
# with Pods running on namespaces labeled with 'metrics: enabled'. Only Pods on those
# namespaces are able to gather data from the metrics endpoint.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/name: project-onboarding-operator
    app.kubernetes.io/managed-by: kustomize
  name: allow-metrics-traffic
  namespace: system
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: project-onboarding-operator
  policyTypes:
    - Ingress
  ingress:
    # Allow in-namespace scrapers (Kind E2E curl pod, debug jobs).
    - from:
      - podSelector: {}
      ports:
        - port: 8443
          protocol: TCP
    # Allow scrapers from OpenShift user-workload / platform monitoring namespaces.
    - from:
      - namespaceSelector:
          matchLabels:
            metrics: enabled
      ports:
        - port: 8443
          protocol: TCP
    - from:
      - namespaceSelector:
          matchLabels:
            network.openshift.io/policy-group: monitoring
      ports:
        - port: 8443
          protocol: TCP
