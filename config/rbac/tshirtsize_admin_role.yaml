# Grants full permissions ('*') over onboarding.stderr.at TShirtSize catalogue entries.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: project-onboarding-operator
    app.kubernetes.io/managed-by: kustomize
  name: tshirtsize-admin-role
rules:
- apiGroups:
  - onboarding.stderr.at
  resources:
  - tshirtsizes
  verbs:
  - '*'
- apiGroups:
  - onboarding.stderr.at
  resources:
  - tshirtsizes/status
  verbs:
  - get
