# This rule is not used by the project-onboarding-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to onboarding.stderr.at resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: project-onboarding-operator
    app.kubernetes.io/managed-by: kustomize
  name: projectonboarding-viewer-role
rules:
- apiGroups:
  - onboarding.stderr.at
  resources:
  - projectonboardings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - onboarding.stderr.at
  resources:
  - projectonboardings/status
  verbs:
  - get
