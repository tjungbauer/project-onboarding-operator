# Grants permissions to create, update, and delete TShirtSize catalogue entries.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: project-onboarding-operator
    app.kubernetes.io/managed-by: kustomize
  name: tshirtsize-editor-role
rules:
- apiGroups:
  - onboarding.stderr.at
  resources:
  - tshirtsizes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - onboarding.stderr.at
  resources:
  - tshirtsizes/status
  verbs:
  - get
