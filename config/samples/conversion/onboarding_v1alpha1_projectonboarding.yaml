apiVersion: onboarding.stderr.at/v1alpha1
kind: ProjectOnboarding
metadata:
  name: projectonboarding-sample
spec:
  namespaces:
    # Tenant namespace the operator creates and configures:
    - name: team-alpha-dev
      additionalSettings:
        podSecurityAudit: restricted
        podSecurityWarn: restricted
        podSecurityEnforce: restricted
        enableClusterMonitoring: true
      resourceQuotas:
        enabled: true
        pods: 20
        cpu: "4"
        memory: 8Gi
        limits:
          cpu: "8"
          memory: 16Gi
        requests:
          cpu: "2"
          memory: 4Gi
      limitRanges:
        enabled: true
        container:
          default:
            cpu: "500m"
            memory: 512Mi
          defaultRequest:
            cpu: "100m"
            memory: 256Mi
          max:
            cpu: "2"
            memory: 2Gi
      defaultPolicies:
        allowFromIngress: true
        allowFromMonitoring: true
        allowKubeAPIServer: true
        allowToDNS: true
        allowFromSameNamespace: true
        denyAllEgress: false
        denyAllIngress: false
