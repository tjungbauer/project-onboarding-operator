# Default values for project-onboarding-operator OLM install.
# This chart creates a CatalogSource + Subscription (OperatorHub path).
# For operator-sdk run bundle installs, use scripts/upgrade-cluster.sh instead.

operatorNamespace: project-onboarding-operator
marketplaceNamespace: openshift-marketplace

catalog:
  name: project-onboarding-operator-catalog
  image: quay.io/tjungbau/project-onboarding-operator-catalog:v0.0.50
  displayName: Project Onboarding Operator
  publisher: tjungbauer

subscription:
  name: project-onboarding-operator
  channel: stable
  startingCSV: project-onboarding-operator.v0.0.50
  installPlanApproval: Automatic

installMode: AllNamespaces
