name: Feature request
description: Suggest an API, reconcile, or platform integration improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What tenant/onboarding workflow is hard to achieve today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API shape, CR field, or behaviour you have in mind
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Helm chart, manual steps, other operators, etc.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - ProjectOnboarding API / reconcile
        - TShirtSize catalogue
        - OpenShift-specific (Groups, EgressIP, …)
        - GitOps / Argo CD
        - Observability / ops
        - Documentation / UX
        - Other
