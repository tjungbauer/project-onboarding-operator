name: Security

on:
  push:
  pull_request:

jobs:
  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          make build
          # Binary mode avoids Go 1.25 SSA panics in source mode; go.mod requires 1.25.11+ for stdlib CVE fixes.
          govulncheck -mode=binary ./bin/manager

  image-scan:
    name: Container image vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Build manager image
        run: |
          docker build --platform=linux/amd64 -t project-onboarding-operator:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: project-onboarding-operator:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
