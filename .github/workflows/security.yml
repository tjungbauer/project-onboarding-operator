name: Security

on:
  push:
  pull_request:

jobs:
  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          make build
          # Binary mode avoids Go 1.25 SSA panics in source mode; go.mod requires 1.25.11+ for stdlib CVE fixes.
          govulncheck -mode=binary ./bin/manager

  image-scan:
    name: Container image vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install operator-sdk
        run: |
          curl -sSL https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64 -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/operator-sdk

      - name: Build and scan operator and bundle images
        env:
          CONTAINER_TOOL: docker
        run: |
          VERSION="$(tr -d ' \n\r' < VERSION)"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          mapfile -t HI_ARGS < <(chmod +x scripts/hi-build-args.sh && PLATFORM=linux/amd64 scripts/hi-build-args.sh)
          docker build --platform=linux/amd64 "${HI_ARGS[@]}" -t "quay.io/tjungbau/project-onboarding-operator:v${VERSION}" .
          make bundle IMG="quay.io/tjungbau/project-onboarding-operator:v${VERSION}"
          make bundle-build BUNDLE_IMG="quay.io/tjungbau/project-onboarding-operator-bundle:v${VERSION}" CONTAINER_TOOL=docker

      - name: Scan operator image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: quay.io/tjungbau/project-onboarding-operator:v${{ env.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        env:
          VERSION: ${{ env.VERSION }}

      - name: Scan bundle image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: quay.io/tjungbau/project-onboarding-operator-bundle:v${{ env.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        env:
          VERSION: ${{ env.VERSION }}
