name: E2E Tests

on:
  push:
  pull_request:

jobs:
  test-e2e:
    name: Kind E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Prepare Kind E2E environment
        env:
          CONTAINER_TOOL: docker
        run: |
          go mod tidy
          make setup-test-e2e
          VERSION="$(tr -d ' \n\r' < VERSION)"
          IMG="example.com/project-onboarding-operator:v${VERSION}"
          mapfile -t HI_ARGS < <(chmod +x scripts/hi-build-args.sh && PLATFORM=linux/amd64 scripts/hi-build-args.sh)
          docker build --platform=linux/amd64 "${HI_ARGS[@]}" -t "${IMG}" .
          kind load docker-image "${IMG}" --name project-onboarding-operator-test-e2e
          docker pull curlimages/curl:8.12.1
          kind load docker-image curlimages/curl:8.12.1 --name project-onboarding-operator-test-e2e
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
          kubectl wait --for=condition=Available -n cert-manager deployment --all --timeout=300s

      - name: Running Test e2e
        env:
          CERT_MANAGER_INSTALL_SKIP: "true"
          E2E_SKIP_IMAGE_BUILD: "true"
          CONTAINER_TOOL: docker
          KIND_CLUSTER: project-onboarding-operator-test-e2e
        run: |
          go test ./test/e2e/ -v -ginkgo.v -timeout 30m -ginkgo.skip="OpenShift test cases"

      - name: Tear down Kind cluster
        if: always()
        run: make cleanup-test-e2e
