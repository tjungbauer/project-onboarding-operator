name: Bundle

on:
  push:
  pull_request:

jobs:
  bundle:
    name: Generate and validate OLM bundle
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install operator-sdk
        run: |
          curl -sSL https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64 -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Generate bundle
        run: |
          go mod tidy
          VERSION="$(tr -d ' \n\r' < VERSION)"
          make bundle IMG="quay.io/tjungbau/project-onboarding-operator:v${VERSION}"

      - name: Check bundle artifacts
        run: |
          test -f bundle.Dockerfile
          test -f bundle/metadata/annotations.yaml
          test -f bundle/manifests/project-onboarding-operator.clusterserviceversion.yaml
          grep -q 'minKubeVersion: 1.28.0' bundle/manifests/project-onboarding-operator.clusterserviceversion.yaml
          VERSION="$(tr -d ' \n\r' < VERSION)"
          grep -q "version: ${VERSION}" bundle/manifests/project-onboarding-operator.clusterserviceversion.yaml
          test ! -f bundle/manifests/controller-manager-rules_monitoring.coreos.com_v1_prometheusrule.yaml
          ! compgen -G "bundle/manifests/*networkpolicy*.yaml" > /dev/null
          grep -q 'metadata.annotations.support:' bundle/manifests/project-onboarding-operator.clusterserviceversion.yaml
          awk '/^metadata:/{m=1} m && /^  annotations:/{a=1} a && /^    description:/{found=1; exit} END{exit !found}' bundle/manifests/project-onboarding-operator.clusterserviceversion.yaml

      - name: Check committed bundle matches generated output
        run: git diff --exit-code bundle/

      - name: Validate catalog index build
        env:
          CONTAINER_TOOL: docker
        run: |
          VERSION="$(tr -d ' \n\r' < VERSION)"
          BUNDLE_IMG="example.com/project-onboarding-operator-bundle:v${VERSION}"
          CATALOG_IMG="example.com/project-onboarding-operator-catalog:v${VERSION}"
          make bundle-build BUNDLE_IMG="${BUNDLE_IMG}" CONTAINER_TOOL=docker
          make catalog-build CATALOG_IMG="${CATALOG_IMG}" BUNDLE_IMGS="${BUNDLE_IMG}" CONTAINER_TOOL=docker PLATFORM=linux/amd64

  scorecard:
    name: Operator SDK scorecard
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install operator-sdk
        run: |
          curl -sSL https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64 -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Prepare Kind cluster and PR operator image
        env:
          CONTAINER_TOOL: docker
        run: |
          go mod tidy
          make setup-test-e2e
          VERSION="$(tr -d ' \n\r' < VERSION)"
          IMG="example.com/project-onboarding-operator:v${VERSION}"
          mapfile -t HI_ARGS < <(chmod +x scripts/hi-build-args.sh && PLATFORM=linux/amd64 scripts/hi-build-args.sh)
          docker build --platform=linux/amd64 "${HI_ARGS[@]}" -t "${IMG}" .
          kind load docker-image "${IMG}" --name project-onboarding-operator-test-e2e
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
          kubectl wait --for=condition=Available -n cert-manager deployment --all --timeout=300s

      - name: Run scorecard
        env:
          CONTAINER_TOOL: docker
        run: |
          VERSION="$(tr -d ' \n\r' < VERSION)"
          IMG="example.com/project-onboarding-operator:v${VERSION}"
          make bundle IMG="${IMG}"
          operator-sdk scorecard --verbose ./bundle --wait-time 300s

      - name: Tear down Kind cluster
        if: always()
        run: make cleanup-test-e2e

  helm:
    name: Helm chart lint and template
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: helm lint charts/project-onboarding-operator

      - name: Check Helm chart appVersion matches VERSION
        run: |
          chart_app="$(grep '^appVersion:' charts/project-onboarding-operator/Chart.yaml | awk '{print $2}' | tr -d '"')"
          repo_ver="$(tr -d ' \n\r' < VERSION)"
          test "${chart_app}" = "${repo_ver}"

      - name: Render Helm chart
        run: |
          helm template project-onboarding-operator charts/project-onboarding-operator \
            --namespace project-onboarding-operator > /tmp/helm-rendered.yaml
          grep -q 'kind: CatalogSource' /tmp/helm-rendered.yaml
          grep -q 'kind: Subscription' /tmp/helm-rendered.yaml
