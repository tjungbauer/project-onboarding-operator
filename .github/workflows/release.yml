name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix (e.g. 0.0.49) — must match VERSION file for bundle drift check
        required: true
      dry_run:
        description: Validate only (default). Publish runs automatically on tag push, not on workflow_dispatch.
        type: boolean
        default: true

jobs:
  validate:
    name: Tests and bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install operator-sdk
        run: |
          curl -sSL https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64 -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Verify HI image lock
        run: |
          chmod +x hack/resolve-hi-digests.sh
          hack/resolve-hi-digests.sh --check

      - name: Lint
        run: make lint

      - name: Go vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          make build
          govulncheck -mode=binary ./bin/manager

      - name: Unit tests
        run: make test

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Prepare Kind E2E environment
        env:
          CONTAINER_TOOL: docker
        run: |
          go mod tidy
          make setup-test-e2e
          VERSION="${{ steps.version.outputs.value }}"
          IMG="example.com/project-onboarding-operator:v${VERSION}"
          mapfile -t HI_ARGS < <(chmod +x scripts/hi-build-args.sh && PLATFORM=linux/amd64 scripts/hi-build-args.sh)
          docker build --platform=linux/amd64 "${HI_ARGS[@]}" -t "${IMG}" .
          kind load docker-image "${IMG}" --name project-onboarding-operator-test-e2e
          docker pull curlimages/curl:8.12.1
          kind load docker-image curlimages/curl:8.12.1 --name project-onboarding-operator-test-e2e
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
          kubectl wait --for=condition=Available -n cert-manager deployment --all --timeout=300s

      - name: Kind E2E tests
        env:
          CERT_MANAGER_INSTALL_SKIP: "true"
          E2E_SKIP_IMAGE_BUILD: "true"
          CONTAINER_TOOL: docker
          KIND_CLUSTER: project-onboarding-operator-test-e2e
        run: |
          go test ./test/e2e/ -v -ginkgo.v -timeout 30m -ginkgo.skip="OpenShift test cases"

      - name: Verify committed bundle
        run: |
          make bundle IMG="quay.io/tjungbau/project-onboarding-operator:v${{ steps.version.outputs.value }}"
          git diff --exit-code bundle/

      - name: Operator SDK scorecard (PR-built image)
        env:
          CONTAINER_TOOL: docker
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          IMG="example.com/project-onboarding-operator:v${VERSION}"
          make bundle IMG="${IMG}"
          operator-sdk scorecard --verbose ./bundle --wait-time 300s

      - name: Tear down Kind cluster
        if: always()
        run: make cleanup-test-e2e

      - name: Dry-run summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Release dry-run completed for version ${{ steps.version.outputs.value }}."
          echo "To publish: commit VERSION + bundle/, tag v${{ steps.version.outputs.value }}, and push the tag."

  publish:
    name: Build, scan, and push images
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pre-release checks
        run: |
          chmod +x scripts/pre-release-check.sh hack/resolve-hi-digests.sh
          ./scripts/pre-release-check.sh "${{ steps.version.outputs.value }}"

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push release images
        env:
          VERSION: ${{ steps.version.outputs.value }}
          CONTAINER_TOOL: docker
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          chmod +x scripts/release-openshift.sh
          SKIP_BUILD=false ./scripts/release-openshift.sh "${VERSION}"

      - name: Scan pushed operator image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: quay.io/tjungbau/project-onboarding-operator:v${{ steps.version.outputs.value }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan pushed bundle image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: quay.io/tjungbau/project-onboarding-operator-bundle:v${{ steps.version.outputs.value }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan pushed catalog image
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: quay.io/tjungbau/project-onboarding-operator-catalog:v${{ steps.version.outputs.value }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Sign images and attach SBOMs
        env:
          VERSION: ${{ steps.version.outputs.value }}
          COSIGN_EXPERIMENTAL: "true"
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          chmod +x scripts/sign-release-images.sh scripts/attest-slsa-provenance.sh
          ./scripts/sign-release-images.sh "${VERSION}"
          ./scripts/attest-slsa-provenance.sh "${VERSION}"

      - name: Verify cosign signatures
        env:
          VERSION: ${{ steps.version.outputs.value }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          chmod +x scripts/verify-release-images.sh scripts/verify-slsa-provenance.sh
          ./scripts/verify-release-images.sh "${VERSION}"
          ./scripts/verify-slsa-provenance.sh "${VERSION}"

      - name: Publish SBOMs on GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/sbom/*.spdx.json
          generate_release_notes: true
