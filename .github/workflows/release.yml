name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix (e.g. 0.0.14)
        required: true

jobs:
  validate:
    name: Tests and bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install operator-sdk
        run: |
          curl -sSL https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64 -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/operator-sdk
      - name: Unit tests
        run: make test
      - name: Generate bundle
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          make bundle IMG="quay.io/tjungbau/project-onboarding-operator:v${VERSION}"
      - name: Verify committed bundle
        run: git diff --exit-code bundle/

  publish:
    name: Build, scan, and push images
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push release images
        env:
          VERSION: ${{ steps.version.outputs.value }}
          CONTAINER_TOOL: docker
        run: |
          chmod +x scripts/release-openshift.sh
          SKIP_BUILD=false ./scripts/release-openshift.sh "${VERSION}"

      - name: Scan pushed operator image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: quay.io/tjungbau/project-onboarding-operator:v${{ steps.version.outputs.value }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
