name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: OpenShift reconcile unit tests
        run: go test ./internal/onboarding/ -run 'OpenShift|EgressIP|Group' -count=1

      - name: Running Tests
        run: |
          go mod tidy
          make test
