apiVersion: onboarding.stderr.at/v1beta1
kind: ProjectOnboarding
metadata:
  name: e2e-openshift-onboarding
spec:
  namespaces:
    - name: e2e-ocp-dev
      defaultPolicies:
        allowFromIngress: false
        allowFromMonitoring: false
        allowKubeAPIServer: false
        allowToDNS: false
        allowFromSameNamespace: true
        denyAllEgress: false
        denyAllIngress: false
      localAdminGroup:
        enabled: true
        users:
          - e2e-tester
      egressIPs:
        enabled: true
        ips:
          - 203.0.113.50
