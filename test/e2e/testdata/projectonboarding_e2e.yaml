apiVersion: onboarding.stderr.at/v1alpha1
kind: ProjectOnboarding
metadata:
  name: e2e-onboarding
spec:
  namespaces:
    - name: e2e-team-dev
      resourceQuotas:
        enabled: true
        pods: 5
        cpu: "1"
        memory: 1Gi
      defaultPolicies:
        allowFromIngress: false
        allowFromMonitoring: false
        allowKubeAPIServer: false
        allowToDNS: false
        allowFromSameNamespace: true
        denyAllEgress: false
        denyAllIngress: false
