# TC-03: T-shirt reference with overwriteTshirt merge
apiVersion: onboarding.stderr.at/v1beta1
kind: ProjectOnboarding
metadata:
  name: tc03-tshirt-onboarding
spec:
  namespaces:
    - name: ocp-test-medium-dev
      projectSize: ocp-test-medium
      overwriteTshirt: true
      resourceQuotas:
        enabled: true
        cpu: "3"
      defaultPolicies:
        allowFromIngress: false
        allowFromMonitoring: false
        allowKubeAPIServer: false
        allowToDNS: false
        allowFromSameNamespace: true
        denyAllEgress: false
        denyAllIngress: false
