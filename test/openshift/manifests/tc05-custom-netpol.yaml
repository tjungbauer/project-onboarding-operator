# TC-05: Custom network policy in addition to defaults
apiVersion: onboarding.stderr.at/v1beta1
kind: ProjectOnboarding
metadata:
  name: tc05-custom-netpol
spec:
  namespaces:
    - name: ocp-test-netpol-dev
      resourceQuotas:
        pods: 10
        cpu: "1"
        memory: 1Gi
      defaultPolicies:
        allowFromIngress: false
        allowFromMonitoring: false
        allowKubeAPIServer: false
        allowToDNS: true
        allowFromSameNamespace: true
        denyAllEgress: false
        denyAllIngress: false
      networkPolicies:
        - name: allow-from-openshift-monitoring-custom
          active: true
          podSelector:
            matchLabels:
              app: metrics-exporter
          ingressRules:
            - selectors:
                - namespaceSelector:
                    matchLabels:
                      network.openshift.io/policy-group: monitoring
